<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUX Hotel Diani</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
      height: 100vh;
    }
    .gold { color: #d4af37; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur z-50">
    <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
      <h1 class="text-4xl font-light tracking-widest">LUX <span class="gold">HOTEL</span></h1>
      <button onclick="document.getElementById('booking').scrollIntoView({behavior:'smooth'})" 
              class="border-2 border-gold px-8 py-3 rounded-full hover:bg-gold hover:text-black transition">
        BOOK NOW
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero flex items-center justify-center text-center">
    <div class="max-w-4xl px-6">
      <p class="text-gold uppercase tracking-[6px] mb-4">Diani Beach, Kenya</p>
      <h1 class="text-6xl md:text-7xl font-light leading-tight">Luxury Redefined<br>on Diani Shores</h1>
      <button onclick="document.getElementById('booking').scrollIntoView({behavior:'smooth'})" 
              class="mt-10 bg-gold text-black px-12 py-5 rounded-full text-lg hover:scale-105 transition">
        RESERVE YOUR STAY
      </button>
    </div>
  </section>

  <!-- Rooms -->
  <section id="booking" class="py-24 bg-zinc-950">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-light mb-12">Book Your Stay</h2>
      <div class="max-w-2xl mx-auto bg-zinc-900 p-12 rounded-3xl">
        <form class="space-y-6">
          <div class="grid md:grid-cols-2 gap-6">
            <input type="date" class="bg-zinc-800 p-5 rounded-2xl">
            <input type="date" class="bg-zinc-800 p-5 rounded-2xl">
          </div>
          <button type="button" class="w-full bg-gold text-black py-6 rounded-2xl text-xl">
            CHECK AVAILABILITY
          </button>
        </form>
      </div>
    </div>
  </section>

  <footer class="py-12 text-center text-gray-500">
    © 2026 LUX Hotel Diani • Diani Beach, Kenya
  </footer>
</body>
</html>
